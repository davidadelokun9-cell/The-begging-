<!DOCTYPE html>

<html>

<head>

    <title>My First Website</title>

    <style>

        body {

            font-family: Arial;

            text-align: center;

            margin-top: 80px;

            background-color: #4da6ff;

        }

        .card {

            background: white;

            padding: 20px;

            width: 250px;

            margin: auto;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;

        }

        button {

            padding: 10px;

            border: none;

            background: black;

            color: white;

            border-radius: 5px;

        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Welcome 👋</h1>

        <p>This is my styled website</p>

        <button>Click Me</button>

    </div>

</body>

</html>
